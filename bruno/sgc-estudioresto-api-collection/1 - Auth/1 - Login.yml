info:
  name: 1 - Login
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/token"
  auth: none
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "userName": "{{username}}",
        "password": "{{password}}"
      }

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status === 200) {
          bru.setEnvVar("token", res.body.token);
          bru.setEnvVar("refresh_token", res.body.refreshToken);
          bru.setEnvVar("restaurant_id", res.body.userRestaurantId);
        }
    - type: tests
      code: |-
        test("Login returns 200", function() {
          expect(res.status).to.equal(200);
        });

        test("Response contains Token", function() {
          expect(res.body).to.have.property("token");
          expect(res.body.token).to.be.a("string").and.not.empty;
        });

        test("Response contains RefreshToken", function() {
          expect(res.body).to.have.property("refreshToken");
        });

settings:
  encodeUrl: true
